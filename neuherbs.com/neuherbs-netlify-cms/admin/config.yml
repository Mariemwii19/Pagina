# ============================================================
# NETLIFY CMS — CONFIGURATION NEUHERBS
# Accès : https://neuherbs.com/admin
# ============================================================

backend:
  name: git-gateway
  branch: main   # ou "master" selon ton repo

# Dossier où les uploads d'images seront stockés
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Netlify Identity
locale: fr

# ============================================================
# COLLECTIONS
# ============================================================
collections:

  # ----------------------------------------------------------
  # PRODUITS
  # ----------------------------------------------------------
  - name: "products"
    label: "Produits"
    label_singular: "Produit"
    folder: "_data/products"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: handle
    summary: "{{name}} — ₹{{price}}"
    fields:
      - label: "Nom du produit"
        name: name
        widget: string
        hint: "Titre affiché sur la page produit"

      - label: "Handle (URL slug)"
        name: handle
        widget: string
        hint: "Ex: deep-sea-fish-oil-omega-3 (pas d'espaces, pas de majuscules)"
        pattern: ['^[a-z0-9-]+$', "Minuscules, chiffres et tirets uniquement"]

      - label: "Prix (INR ₹)"
        name: price
        widget: number
        min: 0

      - label: "Catégorie / Type"
        name: type
        widget: select
        options:
          - Omega-3
          - Multivitamin
          - Ayurveda
          - Ashwagandha
          - Shilajit
          - Seeds
          - Herbal Powder
          - Hair & Skin
          - Collagen
          - Weight Loss
          - Apple Cider Vinegar
          - Probiotics
          - Bone & Joint
          - Specialty
          - Combo
          - Merchandise
          - Service

      - label: "Image principale"
        name: image
        widget: image
        required: false

      - label: "Description courte"
        name: short_description
        widget: text
        required: false
        hint: "1-2 phrases pour le résumé produit"

      - label: "Description complète"
        name: description
        widget: markdown
        required: false

      - label: "SKU"
        name: sku
        widget: string
        required: false

      - label: "Statut"
        name: status
        widget: select
        default: "active"
        options:
          - { label: "Actif", value: "active" }
          - { label: "Hors ligne", value: "draft" }
          - { label: "Archivé", value: "archived" }

      - label: "Mise en avant (Best Seller)"
        name: featured
        widget: boolean
        default: false

      - label: "Bénéfices clés"
        name: benefits
        widget: list
        required: false
        summary: "{{fields.item}}"
        field:
          label: Bénéfice
          name: item
          widget: string

      - label: "Tags SEO"
        name: tags
        widget: list
        required: false
        field:
          label: Tag
          name: item
          widget: string

      - label: "Meta Title (SEO)"
        name: meta_title
        widget: string
        required: false
        hint: "Laisse vide pour utiliser le nom du produit"

      - label: "Meta Description (SEO)"
        name: meta_description
        widget: text
        required: false
        hint: "Max 160 caractères"

  # ----------------------------------------------------------
  # PAGES STATIQUES
  # ----------------------------------------------------------
  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "_data/pages"
    create: true
    delete: false
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - label: "Titre de la page"
        name: title
        widget: string

      - label: "Slug (URL)"
        name: slug
        widget: string
        hint: "Ex: about-us, contact-us"

      - label: "Contenu"
        name: body
        widget: markdown

      - label: "Meta Title (SEO)"
        name: meta_title
        widget: string
        required: false

      - label: "Meta Description (SEO)"
        name: meta_description
        widget: text
        required: false

      - label: "Publier"
        name: published
        widget: boolean
        default: true

  # ----------------------------------------------------------
  # COLLECTIONS (catégories)
  # ----------------------------------------------------------
  - name: "collections"
    label: "Collections"
    label_singular: "Collection"
    folder: "_data/collections"
    create: true
    delete: true
    slug: "{{handle}}"
    summary: "{{name}}"
    fields:
      - label: "Nom de la collection"
        name: name
        widget: string

      - label: "Handle (URL)"
        name: handle
        widget: string
        hint: "Ex: omega-3-supplements"

      - label: "Description"
        name: description
        widget: markdown
        required: false

      - label: "Image de bannière"
        name: image
        widget: image
        required: false

      - label: "Meta Title (SEO)"
        name: meta_title
        widget: string
        required: false

      - label: "Meta Description (SEO)"
        name: meta_description
        widget: text
        required: false

  # ----------------------------------------------------------
  # PARAMÈTRES DU SITE
  # ----------------------------------------------------------
  - name: "settings"
    label: "Paramètres"
    delete: false
    editor:
      preview: false
    files:

      - label: "Paramètres Généraux"
        name: "general"
        file: "_data/settings/general.yml"
        fields:
          - label: "Nom du site"
            name: site_name
            widget: string
            default: "Neuherbs"

          - label: "URL du site"
            name: site_url
            widget: string
            default: "https://neuherbs.com"

          - label: "Email de contact"
            name: contact_email
            widget: string

          - label: "Numéro de téléphone"
            name: phone
            widget: string
            required: false

          - label: "Devise"
            name: currency
            widget: select
            default: INR
            options: [INR, USD, EUR]

          - label: "Pays"
            name: country
            widget: string
            default: "IN"

          - label: "Logo"
            name: logo
            widget: image
            required: false

          - label: "Favicon"
            name: favicon
            widget: image
            required: false

      - label: "Bannière d'annonce"
        name: "announcement"
        file: "_data/settings/announcement.yml"
        fields:
          - label: "Activer la bannière"
            name: enabled
            widget: boolean
            default: true

          - label: "Messages (rotation)"
            name: messages
            widget: list
            summary: "{{fields.text}}"
            fields:
              - label: "Texte"
                name: text
                widget: string
              - label: "Lien"
                name: link
                widget: string
                required: false

      - label: "Réseaux Sociaux"
        name: "social"
        file: "_data/settings/social.yml"
        fields:
          - label: "Instagram"
            name: instagram
            widget: string
            required: false
          - label: "Facebook"
            name: facebook
            widget: string
            required: false
          - label: "YouTube"
            name: youtube
            widget: string
            required: false
          - label: "Twitter / X"
            name: twitter
            widget: string
            required: false

      - label: "SEO & Analytics"
        name: "seo"
        file: "_data/settings/seo.yml"
        fields:
          - label: "Google Analytics ID"
            name: ga_id
            widget: string
            default: "G-YWCL9WCBTM"
            hint: "Ex: G-XXXXXXXXXX"

          - label: "Google Ads ID"
            name: gads_id
            widget: string
            default: "AW-784054203"
            required: false

          - label: "Facebook Pixel ID"
            name: fb_pixel
            widget: string
            default: "492217447793940"
            required: false

          - label: "Meta Title par défaut"
            name: default_title
            widget: string
            default: "Neuherbs — Pure Nutrition & Supplements"

          - label: "Meta Description par défaut"
            name: default_description
            widget: text

          - label: "Robots.txt"
            name: robots
            widget: select
            default: "index, follow"
            options:
              - "index, follow"
              - "noindex, nofollow"

      - label: "Navigation (Menu)"
        name: "navigation"
        file: "_data/settings/navigation.yml"
        fields:
          - label: "Menu principal"
            name: main_nav
            widget: list
            summary: "{{fields.label}}"
            fields:
              - label: "Libellé"
                name: label
                widget: string
              - label: "URL"
                name: url
                widget: string
              - label: "Sous-menu"
                name: children
                widget: list
                required: false
                summary: "{{fields.label}}"
                fields:
                  - label: "Libellé"
                    name: label
                    widget: string
                  - label: "URL"
                    name: url
                    widget: string

          - label: "Menu footer"
            name: footer_nav
            widget: list
            required: false
            summary: "{{fields.label}}"
            fields:
              - label: "Libellé"
                name: label
                widget: string
              - label: "URL"
                name: url
                widget: string
